global:
  suspend: false

imageCatalog:
  name: postgresql-standard-trixie
  major: 18

extension:
  pgvector: 
    enabled: false
    version: "0.8.2"
  postgis: 
    enabled: false
    version: "3.6.2"
  pgaudit: 
    enabled: false
    version: "18.0"

auth:
  username: changeme
  password: changeme
  database: defaultdb

ports:
  - name: pgbouncer
    port: 5432
    protocol: TCP
    targetPort: pgbouncer

storage:
  size: 10Gi

resources:
  limits: {}
  requests:
    memory: 256Mi
    cpu: 250m

security:
  networkPolicy:
    enabled: false

userPreferences:
  language: en

discovery:
  enabled: false
